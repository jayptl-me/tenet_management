services:
  - type: web
    name: pg-api
    runtime: bun
    buildCommand: cd apps/api && bun install && bun run build
    startCommand: cd apps/api && bun run start
    envVars:
      - key: PORT
        value: 8000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Flutter portal web origin (tenant/guardian/visitor) for production CORS
      - key: PORTAL_URL
        sync: false
      # Optional comma-separated extra CORS origins
      - key: CORS_EXTRA_ORIGINS
        sync: false

  - type: static
    name: pg-web
    buildCommand: cd apps/web && bun install && bun run build
    staticPublishPath: apps/web/out
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
